services:
  - type: web
    name: kshana-contour-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: kshana_boutique
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PHONE
        value: "9187202605"
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
