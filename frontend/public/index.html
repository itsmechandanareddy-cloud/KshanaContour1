<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#2D2420" />
        <meta name="description" content="Kshana Contour - Bespoke Tailoring" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Kshana" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16.png" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet" />
        <title>Kshana Contour | Bespoke Tailoring</title>
        <style>
            /* PWA Splash Screen */
            #pwa-splash {
                position: fixed; inset: 0; z-index: 99999;
                background: #2D2420;
                display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                transition: opacity 0.4s ease;
            }
            #pwa-splash.hide { opacity: 0; pointer-events: none; }
            #pwa-splash h1 {
                font-family: 'Cormorant Garamond', Georgia, serif;
                color: #D19B5A; font-size: 32px; font-weight: 300;
                letter-spacing: 6px; margin: 0;
            }
            #pwa-splash p {
                color: #FDFBF7; font-size: 10px;
                letter-spacing: 4px; text-transform: uppercase;
                margin-top: 8px; opacity: 0.5;
            }
        </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="pwa-splash">
            <h1>KSHANA</h1>
            <p>Contour</p>
        </div>
        <div id="root"></div>
        <script>
            // Register Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('/sw.js').then(function(reg) {
                        console.log('SW registered');
                    }).catch(function(err) {
                        console.log('SW registration failed:', err);
                    });
                });
            }
            // Hide splash when app loads
            window.addEventListener('load', function() {
                setTimeout(function() {
                    var s = document.getElementById('pwa-splash');
                    if (s) { s.classList.add('hide'); setTimeout(function() { s.remove(); }, 500); }
                }, 800);
            });
        </script>
    </body>
</html>
